site_name: PDS - Aulas
site_description: Material da disciplina de Processamento Digital de Sinais
site_url: https://lucaslrodri.github.io/PDS-Aulas/
repo_url: https://github.com/lucaslrodri/PDS-Aulas/
use_directory_urls: false

docs_dir: docs

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/image-kernels.js

nav:
  - Início: index.md

theme:
  name: material
  custom_dir: docs/overrides
  language: pt-BR
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  palette:
    primary: white
    accent: custom
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.footer
    - content.code.copy

plugins:
  - search
  - macros

markdown_extensions:
  - attr_list
  - md_in_html
  - sane_lists
  - admonition
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: CCET - Centro de Ciências Exatas e Tecnológicas<br>Curso de Engenharia Elétrica

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lucaslrodri/PDS-Aulas/
